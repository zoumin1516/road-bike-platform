0b-bd2e-c33d6430cb66.mp4"},"FOOTBED_SIZE":{"TOP_CARD":{"SUBHEAD":"您测量所需的工具：","BODY_TEXT":"##### 本次测量所需工具：\n\n* 湿毛巾或湿布\n\n* 两张纸\n\n* 尺子\n\n* 笔\n\n* 高度足以使膝盖呈 90 度角的平椅或长凳","VIDEO_URL":"https://assets.specialized.com/v/specialized/Retul_Foot-Sizing_FINAL/mp4_720p"},"BOTTOM_CARD":{"SUBHEAD":"测量您的足部尺寸和足弓高度","BODY_TEXT":"##### 确定您的足部尺寸和足弓高度\n\n1. 将两张纸放在地板上，坐下，用毛巾或湿布弄湿脚底。\n\n2. 将脚压在纸上，不要用力过猛，否则会使足弓塌陷。\n\n3. 用笔描出脚的轮廓。\n\n4. 用尺子测量脚最长两点间的长度，以及最宽两点间的宽度。您需要把这些测量数据记录下来。\n\n5. 观察您在纸上留下的足弓高度印记，将其与图中最相似的足弓类型进行匹配。\n\n6. 很多人的两只脚大小不同，或者足弓高度不同，这就是为什么我们要求您分别测量左右脚的原因。","IMAGE":"https://assets.specialized.com/i/specialized/Arch_Height_Impressions?$scom-deck-of-cards-tile$&amp;fmt=webp"},"TITLE":"查找您的骑行鞋和鞋垫尺码","SUBHEAD":"SPECIALIZED骑行鞋和Body Geometry鞋垫有多种尺码可供选择，以确保鞋子贴合双脚，让您穿着舒适。鞋码由脚的长度和宽度共同决定。鞋垫则根据足弓高度来选择。这两项测量都应在双脚无负重或坐着的状态下进行，以确定自然足弓高度和脚长。您当地的SPECIALIZED门店可以使用足部测量仪帮您测量足弓高度，您也可以在家自行测量。准备好所需工具，开始测量吧。"}},"WHATS_MY_SIZE":"我应该用什么尺码？","ENTER_HEIGHT":"输入您的身高，让我们为您推荐尺码","MORE_S_SIZING":"详细了解S-Sizing","ENTER":"输入","LEFT_FOOT":"左脚","RIGHT_FOOT":"右脚","ARCH_HEIGHT":"足弓高度","SELECT_ARCH_HEIGHT":"选择足弓高度","HOW_TO_MEASURE":"如何测量","HOW_TO_DETERMINE_ARCH":"如何获得足弓高度","RECOMMENDED_SIZE":"您的推荐尺码：","RECOMMENDED_FOOTBED":"您的推荐鞋垫：","ADD_FOOTBED_TO_CART":"将鞋垫加入购物车","START_OVER":"重新开始","MORE_ON_BODY_GEO":"详细了解Body Geometry","SHIN_LENGTH":"胫骨长度","MEASURE_SHIN_LENGTH":"为获得更准确的结果，请添加您的胫骨长度","HOW_TO_MEASURE_SHIN":"如何测量胫骨长度","SKIP":"跳过","RECOMMENDED_SADDLE_HEIGHT":"您的推荐坐垫高度","MISSING_SHIN":"为获得更准确的结果，请添加您的胫骨长度","IMPERIAL":"英制","METRIC":"公制","HEIGHT":"高度","ADD_FOOTBEDS_TO_CART":"查看鞋垫","ADD_ARCH_HEIGHT":"填入足弓高度","SIT_BONE_WIDTH":"坐骨宽度","BACK":"返回","START":"开始","ENTER_MEASUREMENTS":"输入您的测量数值，我们将会为您推荐骑行鞋尺码和鞋垫。","ENTER_SIT_BONE":"输入您的坐骨宽度，我们将会为您推荐坐垫尺码。","API_ERROR":{"ERROR_STRING":"抱歉，我们暂时无法为您推荐尺码。","ERROR_CTA":"请使用尺码表查找适合您的尺码。"},"length":"长度","width":"宽度","sSizing":"详细了解S-Sizing"}},"mercadoPagoEnabled":false,"naverPayEnabled":false,"priceValidUntil":"2026-04-29","s7Url":"https://assets.specialized.com/i/specialized/","saddle
